<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Campus Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

  <div class="container mt-5" style="max-width: 400px;">
    <div class="card shadow-sm p-4">
      <h3 class="mb-4 text-center fw-bold">Campus Marketplace</h3>
      <h5 class="mb-3 text-center text-muted">Sign In</h5>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email"/>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password"/>
      </div>

      <p id="errorMessage" class="text-danger small" style="display:none;"></p>

      <button id="loginBtn" class="btn btn-primary w-100">Sign In</button>
    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
  apiKey: "AIzaSyDOVPJqR5aYVz0QPqRCfHVDqlsxN2_763E",
  authDomain: "campusmarketplace-4f239.firebaseapp.com",
  projectId: "campusmarketplace-4f239",
  storageBucket: "campusmarketplace-4f239.firebasestorage.app",
  messagingSenderId: "142696098168",
  appId: "1:142696098168:web:1d22a27823d6050ec5808d",
  measurementId: "G-0Q1TQLT08G"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // If already signed in redirect to index
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "index.html";
      }
    });

    // Sign in button
    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorMessage = document.getElementById("errorMessage");

      errorMessage.style.display = "none";

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "index.html";
      } catch (error) {
        errorMessage.textContent = "Invalid email or password. Please try again.";
        errorMessage.style.display = "block";
      }
    });

  </script>
</body>
</html>
