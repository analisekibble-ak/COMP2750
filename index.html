   <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome | Campus Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css" />  ← add this line
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">Campus Marketplace</span>
    <button id="signOutBtn" class="btn btn-danger btn-sm">Sign Out</button>
  </nav>

  <!-- Page Content -->
  <div class="container mt-5 text-center">
    <h2 class="mb-2">Welcome back,</h2>
    <h4 id="userEmail" class="text-muted mb-5"></h4>

    <div class="row g-4 justify-content-center">

      <div class="col-md-4">
        <div class="card shadow-sm p-4 h-100">
          <h5 class="card-title">Browse Marketplace</h5>
          <p class="card-text text-muted">Find items listed by other students</p>
          <a href="marketplace.html" class="btn btn-primary mt-auto">Go to Marketplace</a>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card shadow-sm p-4 h-100">
          <h5 class="card-title">My Listings</h5>
          <p class="card-text text-muted">View the items you have listed</p>
          <a href="mylistings.html" class="btn btn-primary mt-auto">Go to My Listings</a>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card shadow-sm p-4 h-100">
          <h5 class="card-title">My Shortlist</h5>
          <p class="card-text text-muted">View items you have saved</p>
          <a href="shortlist.html" class="btn btn-primary mt-auto">Go to My Shortlist</a>
        </div>
      </div>

    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

   const firebaseConfig = {
  apiKey: "AIzaSyDOVPJqR5aYVz0QPqRCfHVDqlsxN2_763E",
  authDomain: "campusmarketplace-4f239.firebaseapp.com",
  projectId: "campusmarketplace-4f239",
  storageBucket: "campusmarketplace-4f239.firebasestorage.app",
  messagingSenderId: "142696098168",
  appId: "1:142696098168:web:1d22a27823d6050ec5808d",
  measurementId: "G-0Q1TQLT08G"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Check if user is signed in
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      document.getElementById("userEmail").textContent = user.email;
    });

    // Sign out
    document.getElementById("signOutBtn").addEventListener("click", () => {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    });

  </script>
</body>
</html>
