<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketplace | Campus Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css" />  ← add this line
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">Campus Marketplace</span>
    <div>
      <a href="index.html" class="btn btn-outline-light btn-sm me-2">Home</a>
      <button id="signOutBtn" class="btn btn-danger btn-sm">Sign Out</button>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="container mt-4">
    <h2 class="mb-4">Browse Marketplace</h2>
    <div id="itemsContainer" class="row g-4">
      <!-- Items will load here -->
    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Your Firebase config
   const firebaseConfig = {
  apiKey: "AIzaSyDOVPJqR5aYVz0QPqRCfHVDqlsxN2_763E",
  authDomain: "campusmarketplace-4f239.firebaseapp.com",
  projectId: "campusmarketplace-4f239",
  storageBucket: "campusmarketplace-4f239.firebasestorage.app",
  messagingSenderId: "142696098168",
  appId: "1:142696098168:web:1d22a27823d6050ec5808d",
  measurementId: "G-0Q1TQLT08G"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    // Check if user is signed in
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      currentUser = user;
      await loadItems();
    });

    // Load items from Firestore
    async function loadItems() {
      const container = document.getElementById("itemsContainer");
      container.innerHTML = "";

      const querySnapshot = await getDocs(collection(db, "items"));

      querySnapshot.forEach(async (docSnap) => {
        const item = docSnap.data();
        const itemId = docSnap.id;

        // Filter out signed in user's own items
        if (item.sellerID === currentUser.uid) return;

        // Check if already shortlisted
        const shortlistRef = doc(db, "shortlists", currentUser.uid, "items", itemId);
        const shortlistSnap = await getDoc(shortlistRef);
        const isShortlisted = shortlistSnap.exists();

        // Build card
        const col = document.createElement("div");
        col.className = "col-md-4";
        col.innerHTML = `
          <div class="card h-100 shadow-sm">
            <img src="images/${item.image}" class="card-img-top" alt="${item.name}" style="height:200px; object-fit:cover;">
            <div class="card-body">
              <h5 class="card-title">${item.name}</h5>
              <p class="card-text text-muted">${item.description}</p>
              <p class="mb-1"><strong>Price:</strong> $${item.price}</p>
              <p class="mb-1"><strong>Category:</strong> ${item.category}</p>
              <p class="mb-3"><strong>Seller:</strong> ${item.sellerEmail}</p>
              <button 
                class="btn w-100 ${isShortlisted ? 'btn-success disabled' : 'btn-primary'}" 
                onclick="addToShortlist('${itemId}')"
                id="btn-${itemId}"
                ${isShortlisted ? 'disabled' : ''}>
                ${isShortlisted ? 'Shortlisted' : 'Shortlist'}
              </button>
            </div>
          </div>
        `;
        container.appendChild(col);
      });
    }

    // Add to shortlist
    window.addToShortlist = async function(itemId) {
      const shortlistRef = doc(db, "shortlists", currentUser.uid, "items", itemId);
      await setDoc(shortlistRef, { itemId: itemId });

      // Update button
      const btn = document.getElementById(`btn-${itemId}`);
      btn.textContent = "Shortlisted";
      btn.classList.remove("btn-primary");
      btn.classList.add("btn-success", "disabled");
      btn.disabled = true;
    }

    // Sign out
    document.getElementById("signOutBtn").addEventListener("click", () => {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    });

  </script>
</body>
</html>
