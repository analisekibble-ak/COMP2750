<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Shortlist | Campus Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand fw-bold">Campus Marketplace</span>
    <div>
      <a href="index.html" class="btn btn-outline-light btn-sm me-2">Home</a>
      <button id="signOutBtn" class="btn btn-danger btn-sm">Sign Out</button>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="container mt-4">
    <h2 class="mb-4">My Shortlist</h2>
    <div id="shortlistContainer" class="row g-4">
      <!-- Shortlisted items will load here -->
    </div>
    <p id="emptyMessage" class="text-muted" style="display:none;">
      You have not shortlisted any items yet.
    </p>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyDOVPJqR5aYVz0QPqRCfHVDqlsxN2_763E",
  authDomain: "campusmarketplace-4f239.firebaseapp.com",
  projectId: "campusmarketplace-4f239",
  storageBucket: "campusmarketplace-4f239.firebasestorage.app",
  messagingSenderId: "142696098168",
  appId: "1:142696098168:web:1d22a27823d6050ec5808d",
  measurementId: "G-0Q1TQLT08G"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    // Check if user is signed in
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      currentUser = user;
      await loadShortlist();
    });

    // Load shortlisted items
    async function loadShortlist() {
      const container = document.getElementById("shortlistContainer");
      const emptyMessage = document.getElementById("emptyMessage");
      container.innerHTML = "";

      // Get all items in the user's shortlist
      const shortlistSnap = await getDocs(
        collection(db, "shortlists", currentUser.uid, "items")
      );

      if (shortlistSnap.empty) {
        emptyMessage.style.display = "block";
        return;
      }

      shortlistSnap.forEach(async (shortlistDoc) => {
        const itemId = shortlistDoc.id;

        // Get the full item details from the items collection
        const itemRef = doc(db, "items", itemId);
        const itemSnap = await getDoc(itemRef);

        if (!itemSnap.exists()) return;

        const item = itemSnap.data();

        // Build card
        const col = document.createElement("div");
        col.className = "col-md-4";
        col.id = `card-${itemId}`;
        col.innerHTML = `
          <div class="card h-100 shadow-sm">
            <img src="images/${item.image}" class="card-img-top" alt="${item.name}" style="height:200px; object-fit:cover;">
            <div class="card-body">
              <h5 class="card-title">${item.name}</h5>
              <p class="card-text text-muted">${item.description}</p>
              <p class="mb-1"><strong>Price:</strong> $${item.price}</p>
              <p class="mb-1"><strong>Category:</strong> ${item.category}</p>
              <p class="mb-3"><strong>Seller:</strong> ${item.sellerEmail}</p>
              <button 
                class="btn btn-danger w-100" 
                onclick="removeFromShortlist('${itemId}')">
                Remove
              </button>
            </div>
          </div>
        `;
        container.appendChild(col);
      });
    }

    // Remove item from shortlist
    window.removeFromShortlist = async function(itemId) {
      const shortlistRef = doc(db, "shortlists", currentUser.uid, "items", itemId);
      await deleteDoc(shortlistRef);

      // Remove card from page
      const card = document.getElementById(`card-${itemId}`);
      if (card) card.remove();

      // Show empty message if no items left
      const container = document.getElementById("shortlistContainer");
      if (container.children.length === 0) {
        document.getElementById("emptyMessage").style.display = "block";
      }
    }

    // Sign out
    document.getElementById("signOutBtn").addEventListener("click", () => {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    });

  </script>
</body>
</html>
